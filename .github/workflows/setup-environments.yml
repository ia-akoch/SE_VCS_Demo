name: Setup GitHub Environments

# Prerequisites — add these as repository secrets before running:
#   SETUP_PAT            — Personal Access Token with repo scope (GITHUB_TOKEN cannot manage environments/secrets)
#   IGNITION_API_TOKEN_TEST — Ignition API token for the test gateway
#   IGNITION_API_TOKEN_PROD — Ignition API token for the prod gateway

on:
  workflow_dispatch:
    inputs:
      repo_path_test:
        description: "REPO_PATH for test (path to repo on the test server)"
        required: true
      gateway_port_test:
        description: "GATEWAY_PORT for test"
        required: true
        default: "8088"
      repo_path_prod:
        description: "REPO_PATH for prod (path to repo on the prod server)"
        required: true
      gateway_port_prod:
        description: "GATEWAY_PORT for prod"
        required: true
        default: "8088"

jobs:
  setup-environments:
    name: Setup environments
    runs-on: ubuntu-latest

    steps:
      - name: Create test environment
        env:
          GH_TOKEN: ${{ secrets.SETUP_PAT }}
        run: gh api --method PUT "repos/${{ github.repository }}/environments/test"

      - name: Set test variables
        env:
          GH_TOKEN: ${{ secrets.SETUP_PAT }}
        run: |
          set_var() {
            local env="$1" name="$2" value="$3"
            gh api --method POST "repos/${{ github.repository }}/environments/${env}/variables" \
              -f name="$name" -f value="$value" 2>/dev/null || \
            gh api --method PATCH "repos/${{ github.repository }}/environments/${env}/variables/${name}" \
              -f value="$value"
          }
          set_var test REPO_PATH    "${{ github.event.inputs.repo_path_test }}"
          set_var test GATEWAY_PORT "${{ github.event.inputs.gateway_port_test }}"

      - name: Set test secret
        env:
          GH_TOKEN: ${{ secrets.SETUP_PAT }}
          TOKEN: ${{ secrets.IGNITION_API_TOKEN_TEST }}
        run: echo "$TOKEN" | gh secret set IGNITION_API_TOKEN --env test --repo "${{ github.repository }}"

      - name: Create prod environment
        env:
          GH_TOKEN: ${{ secrets.SETUP_PAT }}
        run: gh api --method PUT "repos/${{ github.repository }}/environments/prod"

      - name: Set prod variables
        env:
          GH_TOKEN: ${{ secrets.SETUP_PAT }}
        run: |
          set_var() {
            local env="$1" name="$2" value="$3"
            gh api --method POST "repos/${{ github.repository }}/environments/${env}/variables" \
              -f name="$name" -f value="$value" 2>/dev/null || \
            gh api --method PATCH "repos/${{ github.repository }}/environments/${env}/variables/${name}" \
              -f value="$value"
          }
          set_var prod REPO_PATH    "${{ github.event.inputs.repo_path_prod }}"
          set_var prod GATEWAY_PORT "${{ github.event.inputs.gateway_port_prod }}"

      - name: Set prod secret
        env:
          GH_TOKEN: ${{ secrets.SETUP_PAT }}
          TOKEN: ${{ secrets.IGNITION_API_TOKEN_PROD }}
        run: echo "$TOKEN" | gh secret set IGNITION_API_TOKEN --env prod --repo "${{ github.repository }}"